simulation:
  dt: 0.1
  planning_rate: 5.0
  steps: 20
  start: [-8.0, 0.0]
  goal: [8.0, 0.0]
  dynamic_obstacles:
    - position: [0.0, -3.0]
      velocity: [0.0, 0.8]
      radius: 0.35
  static_obstacles:
    - type: circle
      center: [1.5, 0.5]
      radius: 0.6

sensor:
  range: 8.0
  fov_deg: 180.0
  position_noise_std: 0.05
  velocity_noise_std: 0.08
  dropout_prob: 0.0

risk_grid:
  width: 200
  height: 160
  resolution: 0.1
  origin: [-10.0, -8.0]
  time_step: 0.2
  time_slices: 30

risk_model:
  static_risk: 1.0
  dynamic_risk: 1.0
  unknown_risk: 0.2
  base_sigma: 0.35
  uncertainty_growth: 0.08
  robot_radius: 0.2
  safety_margin: 0.15

astar:
  nominal_speed: 1.2
  risk_weight: 8.0
  risk_reject_threshold: 0.75

corridor:
  min_half_width: 0.35
  max_half_width: 1.5
  expansion_step: 0.1
  sample_step: 0.2
  single_cell_threshold: 0.65
  accumulated_threshold: 2.0
  margin: 0.05
  weight: 3000.0
  power: 3.0

mco:
  v_max: 2.5
  a_max: 5.0
  w_energy: 1.0
  w_time: 10.0
  w_feasibility: 5000.0
  w_distance: 100.0
  w_risk: 2500.0
  risk_threshold: 0.25
  risk_power: 2.0
  kappa: 12
  lbfgs_max_iterations: 80
